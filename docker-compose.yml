# ============================================================================
# Docker Compose Configuration for AI Compliance Check API
# ============================================================================
# This file defines services for running the MLS compliance checking API
# in containerized environments (development or production).
# ============================================================================

version: "3.9"

services:
  # --------------------------------------------------------------------------
  # API Service - FastAPI Application
  # --------------------------------------------------------------------------
  api:
    build: .
    container_name: compliance_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env  # Fallback for local dev; shell env vars (TeamCity/Octopus) take priority
    volumes:
      - .:/app  # Mount current directory for hot-reload during development
      - ./var/log/ai-compliance-api:/app/logs  # Persist logs outside container
      - ./var/data:/data  # Persist SQLite DB on host (local folder `./data`)
      - prometheus_multiproc:/tmp/prometheus_multiproc  # Shared dir for multiprocess metrics
    environment:
      - PYTHONUNBUFFERED=1  # Force real-time log output
      - PROMPT_SQLITE_PATH=/data/prompt_replica.db
      - OPENAI_API_KEY
      - ENVIRONMENT
      - OCTOPUS_RELEASE
      - JWT_SECRET_KEY
      - JWT_ALGORITHM
      - ACCESS_TOKEN_EXPIRE_MINUTES
      - REFRESH_TOKEN_EXPIRE_DAYS
      - SERVICE_API_KEY
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus_multiproc
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Development mode: Use --reload for auto-restart on code changes
    # Production mode: Use --workers 4 for multiple worker processes
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4

    # Make sure API can talk to Langfuse container
    networks:
      - shared_backend

  # --------------------------------------------------------------------------
  # Cron Service - Calls FastAPI Endpoint Every 5 Minutes
  # --------------------------------------------------------------------------
  cron:
    image: alpine:latest
    container_name: compliance_cron
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - shared_backend
    command: >
      sh -c "
      apk add --no-cache curl &&
      echo '*/5 * * * * curl -s -X POST http://compliance_api:8000/prompts/sync >> /var/log/cron.log 2>&1' > /etc/crontabs/root &&
      crond -f -l 2
      "

  # --------------------------------------------------------------------------
  # Prometheus - Metrics Collection
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: compliance_prometheus
    restart: unless-stopped
    ports:
      - "9092:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    depends_on:
      - api
    networks:
      - shared_backend

  # --------------------------------------------------------------------------
  # Grafana - Dashboards & Visualization
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: compliance_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - shared_backend

networks:
  shared_backend:
    external: true

volumes:
  prometheus_data:
  grafana_data:
  prometheus_multiproc:

# ============================================================================
# Usage Instructions:
# ============================================================================
# Development:
#   docker-compose up              # Start with logs
#   docker-compose up -d           # Start in background
#   docker-compose logs -f api     # Follow logs
#   docker-compose down            # Stop all services
#
# Monitoring:
#   http://localhost:8000/metrics   # Prometheus metrics endpoint
#   http://localhost:9090           # Prometheus UI
#   http://localhost:3001           # Grafana (admin/admin)
#
# Rebuild after code changes:
#   docker-compose up --build
#
# Access API:
#   http://localhost:8000/docs      # Swagger UI
# ============================================================================
